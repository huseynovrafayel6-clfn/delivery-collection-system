spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/delivery_collection_system
    username: postgres
    password: 12345678
    hikari:
      connection-timeout: 30000
      idle-timeout: 30000
      max-lifetime: 1800000
      keepalive-time: 60000
      minimum-idle: 3
      maximum-pool-size: 4
      auto-commit: true
      connection-test-query: select 1
      jpa:
        properties:
          hibernate:
            dialect: org.hibernate.dialect.PostgreSQLDialect
            default_schema: public
        hibernate:
          ddl-auto: none
        show-sql: false
        defer-datasource-initialization: false
        open-in-view: false
      h2:
        console:
          enabled: true
      sql:
        init:
          mode: always



security:
  jwt:
    access-token-validity-time: 1800000
    public-key: 
    private-key: 
    refresh-token-validity-time: 86400000
